<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game Tetris Nâng Cấp - Sửa Lỗi Triệt Để</title>
    <style>
        body {
            background-color: #202020;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        h1 {
            margin: 5px 0 15px 0;
            color: #f1c40f;
            text-shadow: 2px 2px #c0392b;
            font-size: 2.5rem;
        }

        #game-container {
            display: flex;
            gap: 30px;
            background: #333;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 12px 35px rgba(0,0,0,0.6);
        }

        canvas {
            border: 5px solid #fff;
            background-color: #111;
        }

        #side-panel {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-width: 200px;
        }

        .info-box {
            background: #444;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-size: 1.2rem;
            margin-bottom: 12px;
        }

        .info-box span {
            display: block;
            font-size: 2.2rem;
            font-weight: bold;
            color: #2ecc71;
            margin-top: 5px;
        }

        #next-canvas {
            border: 2px solid #aaa;
            background-color: #111;
            display: block;
            margin: 12px auto 0 auto;
        }

        select {
            width: 100%;
            padding: 10px;
            background: #555;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            margin-top: 5px;
            cursor: pointer;
        }

        .btn {
            width: 100%;
            padding: 12px;
            font-size: 1.1rem;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            margin-top: 10px;
        }

        #btn-start { background-color: #e74c3c; }
        #btn-start:hover { background-color: #c0392b; }
        
        #btn-pause { background-color: #3498db; }
        #btn-pause:hover { background-color: #2980b9; }

        #mobile-controls {
            display: none;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 25px;
            width: 100%;
            max-width: 340px;
        }

        .touch-btn {
            background: #444;
            color: white;
            border: 2px solid #666;
            padding: 20px 0;
            font-size: 1.5rem;
            font-weight: bold;
            text-align: center;
            border-radius: 10px;
            cursor: pointer;
            touch-action: manipulation;
        }

        .touch-btn:active {
            background: #f1c40f;
            color: #000;
            border-color: #fff;
        }

        @media (max-width: 768px) {
            #game-container {
                flex-direction: column;
                align-items: center;
                padding: 15px;
                gap: 15px;
            }
            #side-panel {
                min-width: 300px;
                flex-direction: row;
                flex-wrap: wrap;
                gap: 10px;
            }
            #side-panel > div {
                flex: 1;
                min-width: 140px;
            }
            .info-box { margin-bottom: 5px; }
            #mobile-controls { display: grid; }
        }
    </style>
</head>
<body>

    <h1>TETRIS</h1>

    <div id="game-container">
        <canvas id="tetris" width="300" height="500"></canvas>

        <div id="side-panel">
            <div>
                <div class="info-box">
                    TIẾP THEO
                    <canvas id="next-canvas" width="100" height="100"></canvas>
                </div>
                <div class="info-box">
                    ĐỘ KHÓ
                    <select id="difficulty" onchange="changeDifficulty()">
                        <option value="1200">Dễ</option>
                        <option value="800" selected>Bình thường</option>
                        <option value="400">Khó</option>
                        <option value="150">Ác mộng</option>
                    </select>
                </div>
            </div>

            <div>
                <div class="info-box">
                    DIỂM SỐ
                    <span id="score">0</span>
                </div>
                <div class="info-box">
                    CẤP ĐỘ
                    <span id="level">1</span>
                </div>
                <button id="btn-pause" class="btn" onclick="togglePause()">TẠM DỪNG</button>
                <button id="btn-start" class="btn" onclick="startGame()">CHƠI LẠI</button>
            </div>
        </div>
    </div>

    <div id="mobile-controls">
        <div class="touch-btn" onpointerdown="playerRotate(1)">🔄 Xoay</div>
        <div class="touch-btn" onpointerdown="playerHardDrop()">⬆️ Thả</div>
        <div class="touch-btn" onpointerdown="togglePause()">⏸️ Dừng</div>
        
        <div class="touch-btn" onpointerdown="playerMove(-1)">⬅️ Trái</div>
        <div class="touch-btn" onpointerdown="playerDrop()">⬇️ Xuống</div>
        <div class="touch-btn" onpointerdown="playerMove(1)">➡️ Phải</div>
    </div>

<script>
const canvas = document.getElementById('tetris');
const context = canvas.getContext('2d');
context.scale(25, 25);

const nextCanvas = document.getElementById('next-canvas');
const nextContext = nextCanvas.getContext('2d');
nextContext.scale(25, 25);

function createMatrix(w, h) {
    const matrix = [];
    while (h--) {
        matrix.push(new Array(w).fill(0));
    }
    return matrix;
}

const SHAPES = 'ILJOTSZ';
const COLORS = [
    null, '#ff0dff', '#0dff0d', '#ff0d0d', '#0011ff', '#ff9900', '#33ffff', '#ffff00'
];

function createPiece(type) {
    if (type === 'T') return [[0, 0, 0], [1, 1, 1], [0, 1, 0]];
    if (type === 'O') return [[2, 2], [2, 2]];
    if (type === 'L') return [[0, 3, 0], [0, 3, 0], [0, 3, 3]];
    if (type === 'J') return [[0, 4, 0], [0, 4, 0], [4, 4, 0]];
    if (type === 'I') return [[0, 5, 0, 0], [0, 5, 0, 0], [0, 5, 0, 0], [0, 5, 0, 0]];
    if (type === 'S') return [[0, 6, 6], [6, 6, 0], [0, 0, 0]];
    if (type === 'Z') return [[7, 7, 0], [0, 7, 7], [0, 0, 0]];
}

function drawMatrix(ctx, matrix, offset) {
    matrix.forEach((row, y) => {
        row.forEach((value, x) => {
            if (value !== 0) {
                ctx.fillStyle = COLORS[value];
                ctx.fillRect(x + offset.x, y + offset.y, 1, 1);
                ctx.strokeStyle = '#111';
                ctx.lineWidth = 0.05;
                ctx.strokeRect(x + offset.x, y + offset.y, 1, 1);
            }
        });
    });
}

function draw() {
    context.fillStyle = '#111';
    context.fillRect(0, 0, canvas.width, canvas.height);
    
    drawMatrix(context, arena, {x: 0, y: 0});
    if (player.matrix) {
        drawMatrix(context, player.matrix, player.pos);
    }

    nextContext.fillStyle = '#111';
    nextContext.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
    if (player.nextMatrix) {
        const nMatrix = player.nextMatrix;
        const offsetX = (4 - nMatrix[0].length) / 2;
        const offsetY = (4 - nMatrix.length) / 2;
        drawMatrix(nextContext, nMatrix, {x: offsetX, y: offsetY});
    }

    if (gameOver) {
        context.fillStyle = 'rgba(0, 0, 0, 0.75)';
        context.fillRect(0, 0, canvas.width, canvas.height);
        context.fillStyle = '#e74c3c';
        context.font = '1.2px sans-serif';
        context.textAlign = 'center';
        context.fillText("GAME OVER", arena[0].length / 2, arena.length / 2 - 1);
        context.fillStyle = '#fff';
        context.font = '0.7px sans-serif';
        context.fillText("Bấm CHƠI LẠI để chơi tiếp", arena[0].length / 2, arena.length / 2 + 1);
    } else if (isPaused) {
        context.fillStyle = 'rgba(0, 0, 0, 0.5)';
        context.fillRect(0, 0, canvas.width, canvas.height);
        context.fillStyle = '#f1c40f';
        context.font = '1.2px sans-serif';
        context.textAlign = 'center';
        context.fillText("TẠM DỪNG", arena[0].length / 2, arena.length / 2);
    }
}

function merge(arena, player) {
    player.matrix.forEach((row, y) => {
        row.forEach((value, x) => {
            if (value !== 0) {
                arena[y + player.pos.y][x + player.pos.x] = value;
            }
        });
    });
}

function collide(arena, player) {
    const [m, o] = [player.matrix, player.pos];
    for (let y = 0; y < m.length; ++y) {
        for (let x = 0; x < m[y].length; ++x) {
            if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
                return true;
            }
        }
    }
    return false;
}

function arenaSweep() {
    let rowCount = 1;
    outer: for (let y = arena.length - 1; y > 0; --y) {
        for (let x = 0; x < arena[y].length; ++x) {
            if (arena[y][x] === 0) continue outer;
        }
        const row = arena.splice(y, 1)[0].fill(0);
        arena.unshift(row);
        ++y;

        player.score += rowCount * 10;
        rowCount *= 2;
        player.level = Math.floor(player.score / 50) + 1;
        calculateSpeed();
    }
}

function playerDrop() {
    if (isPaused || gameOver || !player.matrix) return;
    player.pos.y++;
    if (collide(arena, player)) {
        player.pos.y--;
        merge(arena, player);
        playerReset();
        arenaSweep();
        updateScore();
    }
    dropCounter = 0;
}

function playerHardDrop() {
    if (isPaused || gameOver || !player.matrix) return;
    while (!collide(arena, player)) {
        player.pos.y++;
    }
    player.pos.y--;
    merge(arena, player);
    playerReset();
    arenaSweep();
    updateScore();
    dropCounter = 0;
}

function playerMove(dir) {
    if (isPaused || gameOver || !player.matrix) return;
    player.pos.x += dir;
    if (collide(arena, player)) {
        player.pos.x -= dir;
    }
}

function playerReset() {
    const pieces = SHAPES;
    if (!player.nextMatrix) {
        player.nextMatrix = createPiece(pieces[pieces.length * Math.random() | 0]);
    }
    player.matrix = player.nextMatrix;
    player.nextMatrix = createPiece(pieces[pieces.length * Math.random() | 0]);
    player.pos.y = 0;
    player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
    
    if (collide(arena, player)) {
        gameOver = true;
    }
}

function playerRotate(dir) {
    if (isPaused || gameOver || !player.matrix) return;
    const pos = player.pos.x;
    let offset = 1;
    rotate(player.matrix, dir);
    while (collide(arena, player)) {
        player.pos.x += offset;
        offset = -(offset + (offset > 0 ? 1 : -1));
        if (offset > player.matrix[0].length) {
            rotate(player.matrix, -dir);
            player.pos.x = pos;
            return;
        }
    }
}

function rotate(matrix, dir) {
    for (let y = 0; y < matrix.length; ++y) {
        for (let x = 0; x < y; ++x) {
            [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
        }
    }
    if (dir > 0) matrix.forEach(row => row.reverse());
    else matrix.reverse();
}

function updateScore() {
    document.getElementById('score').innerText = player.score;
    document.getElementById('level').innerText = player.level;
}

let baseInterval = 800;
let dropCounter = 0;
let dropInterval = 800;
let lastTime = 0;
let isPaused = false;
let gameOver = false; // Vào game chạy trực tiếp luôn

function changeDifficulty() {
    baseInterval = parseInt(document.getElementById('difficulty').value);
    calculateSpeed();
    document.activeElement.blur();
}

function calculateSpeed() {
    dropInterval = Math.max(80, baseInterval - (player.level - 1) * 70);
}

function togglePause() {
    if (gameOver) return;
    isPaused = !isPaused;
    const btn = document.getElementById('btn-pause');
    if (isPaused) {
        btn.innerText = "TIẾP TỤC";
        btn.style.backgroundColor = "#2ecc71";
    } else {
        btn.innerText = "TẠM DỪNG";
        btn.style.backgroundColor = "#3498db";
    }
    draw();
}

function update(time = 0) {
    const deltaTime = time - lastTime;
    lastTime = time;

    if (!isPaused && !gameOver) {
        dropCounter += deltaTime;
        if (dropCounter > dropInterval) {
            playerDrop();
        }
    }

    draw();
    requestAnimationFrame(update);
}

document.addEventListener('keydown', event => {
    if (event.keyCode === 37) playerMove(-1);
    else if (event.keyCode === 39) playerMove(1);
    else if (event.keyCode === 40) playerDrop();
    else if (event.keyCode === 38) playerHardDrop();
    else if (event.keyCode === 32) playerRotate(1);
    else if (event.keyCode === 80) togglePause();
});

const arena = createMatrix(12, 20);
const player = {
    pos: {x: 0, y: 0},
    matrix: null,
    nextMatrix: null,
    score: 0,
    level: 1,
};

function startGame() {
    arena.forEach(row => row.fill(0));
    player.score = 0;
    player.level = 1;
    isPaused = false;
    gameOver = false;
    document.getElementById('btn-pause').innerText = "TẠM DỪNG";
    document.getElementById('btn-pause').style.backgroundColor = "#3498db";
    changeDifficulty();
    player.nextMatrix = null;
    playerReset();
    updateScore();
}

// Chạy trực tiếp game
startGame();
update();
</script>
</body>
</html>
